<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="output.css">

<body class="bg-black">
    <div class="flex border-white bg-white m-20 w-[55rem] rounded-lg ml-80">

        <h1 class="font-semibold text-3xl mt-20">WELCOME BACK</h1>
        <p class="pb-8 text-sm text-zinc-400">Welcome back! Please enter your credentials </p>

        <input class="border-2 border-zinc-300 rounded-lg w-70 h-10 pl-4 py-4 mb-4 mt-1" type="email" placeholder="Enter your email " required name="em"><br>
        <label class="font-semibold">Password</label><br>

        <div class="font-semibold">
            <input class="font-semibold" type="checkbox">Remember me

        </div>
        <button  class="bg-[#EA454C] w-70 rounded-lg h-10 text-white mt-2 mb-2">Sign in</button><br>
        <button class="border border-zinc-400 w-70 rounded-lg h-10 font-semibold">
            <div class="flex">
                <img class="h-8 pl-12" src="image/google-logo-removebg-preview.png" alt="logo of Google">
                <p class="text-center">Sign in with Google</p>
            </div>
            </button><br>
            <div class="flex pt-2">
                <p class="text-sm">Don't have an account?</p>
                <a class="text-sm text-red-400 font-semibold" href="signIn.html">Sign up for free!</a>
            </div>
    </div>
    <div><img class="h-[35rem] rounded-xl" src="image/Screenshot 2026-01-26 160140.png" alt="image"></div>
