<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-100">
    <div class="p-8">
        <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
        <p class="mt-4 text-gray-600">Welcome to your dashboard!</p>
        
        <div class="mt-8 p-6 bg-white rounded-lg shadow">
            <h2 class="text-xl font-semibold">User Info</h2>
            <p class="mt-2">You have successfully logged in.</p>
        </div>
        
        <button onclick="logout()" class="mt-8 px-6 py-2 bg-red-500 text-white rounded-lg">
            Logout
        </button>
    </div>
    
    <script>
        function logout() {
            // Clear any stored tokens/session data
            localStorage.clear();
            sessionStorage.clear();
            // Redirect to login
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
